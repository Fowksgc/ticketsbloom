<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TicketsBloom - Selección</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg: #050509;
      --card: #10101e;
      --accent: #00f2fe;
      --border: #1f1f33;
      --text: #ffffff;
      --input-bg: #080812;
    }

    body {
      font-family: -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: var(--card);
      padding: 30px;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    h2 { color: var(--accent); letter-spacing: 4px; font-size: 1.4rem; margin-bottom: 5px; text-transform: uppercase; }
    .subtitle { color: #666; font-size: 11px; margin-bottom: 30px; letter-spacing: 1px; }

    label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

    /* GRID DE BOTONES - ESTILO GOOGLE SCRIPTS */
    .grid-precios {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn-precio {
      background: var(--input-bg);
      border: 1px solid var(--border);
      padding: 25px 10px;
      border-radius: 18px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .btn-precio b { font-size: 16px; margin-bottom: 5px; text-transform: uppercase; }
    .btn-precio span { font-size: 13px; opacity: 0.5; font-weight: bold; }

    /* Efecto de selección / Hover */
    .btn-precio:active, .btn-precio.selected {
      border-color: var(--accent);
      background: rgba(0, 242, 254, 0.1);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
      transform: scale(0.98);
    }

    #loading-msg { color: var(--accent); font-size: 12px; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
    <h2>TICKETSBLOOM</h2>
    <div class="subtitle" id="promotor-tag">SESIÓN INICIADA</div>

    <div class="field">
        <label>Selecciona tipo de entrada</label>
        <div id="grid-precios" class="grid-precios">
            <div id="loading-msg">Cargando tickets desde la base de datos...</div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SUPABASE_URL = 'https://nakrilawyrppxvjnrbks.supabase.co/'; 
    const SUPABASE_KEY = 'sb_publishable_JJGnQbTeKrQ8m02e76pZpg_nJ9lGp0m';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const promotor = localStorage.getItem('promotor_activo') || 'Invitado';
    document.getElementById('promotor-tag').innerText = "PROMOTOR: " + promotor.toUpperCase();

    // 1. CARGAR BOTONES DINÁMICAMENTE
    async function cargarPrecios() {
        const grid = document.getElementById('grid-precios');
        
        // Consultamos la tabla 'precios'
        const { data, error } = await _supabase.from('precios').select('*');

        if (error) {
            console.error("Error Supabase:", error);
            grid.innerHTML = "<p style='color:red;'>Error al cargar. Revisa las políticas RLS.</p>";
            return;
        }

        if (data.length === 0) {
            grid.innerHTML = "<p>No hay precios configurados.</p>";
            return;
        }

        grid.innerHTML = ""; // Limpiar mensaje de carga

        data.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'btn-precio';
            btn.innerHTML = `<b>${p.tipo_entrada}</b><span>$${p.precio}</span>`;
            
            btn.onclick = function() {
                // Guardamos la selección y pasamos al siguiente paso
                localStorage.setItem('ticket_seleccionado', p.tipo_entrada);
                localStorage.setItem('precio_seleccionado', p.precio);
                
                // Efecto visual rápido antes de cambiar de página
                btn.classList.add('selected');
                
                setTimeout(() => {
                    // Aquí rediriges a la página donde pides el nombre
                    window.location.href = "cliente.html"; 
                }, 200);
            };
            grid.appendChild(btn);
        });
    }

    window.onload = cargarPrecios;
</script>

</body>
</html>
