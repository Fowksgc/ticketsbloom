<div class="field">
    <label>Selecciona el Tipo de Entrada</label>
    <div id="botones-precios" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
        <p style="color: #666; font-size: 12px;">Cargando precios...</p>
    </div>
    <input type="hidden" id="tipo-entrada-seleccionada">
</div>

<script>
    // Configuración (Usa tus mismas llaves)
    const SUPABASE_URL = 'https://tu-proyecto.supabase.co'; 
    const SUPABASE_KEY = 'tu-llave-anon-public'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entradaSeleccionada = "";

    // FUNCIÓN PARA CARGAR BOTONES DESDE SUPABASE
    async function cargarBotonesPrecios() {
        const contenedor = document.getElementById('botones-precios');
        
        // Traemos los datos de la tabla 'precios'
        const { data, error } = await _supabase
            .from('precios')
            .select('tipo_entrada, precio');

        if (error) {
            contenedor.innerHTML = "<p style='color:red;'>Error al cargar precios</p>";
            return;
        }

        contenedor.innerHTML = ""; // Limpiar mensaje de carga

        data.forEach(p => {
            const btn = document.createElement('button');
            btn.type = "button";
            btn.className = "btn-precio";
            btn.innerHTML = `<b>${p.tipo_entrada}</b><br>$${p.precio}`;
            
            // Estilo del botón (puedes mover esto al CSS)
            Object.assign(btn.style, {
                padding: "15px",
                backgroundColor: "#0d0d1a",
                border: "1px solid #33334d",
                borderRadius: "12px",
                color: "white",
                cursor: "pointer",
                transition: "all 0.3s"
            });

            btn.onclick = () => seleccionarEntrada(btn, p.tipo_entrada);
            contenedor.appendChild(btn);
        });
    }

    function seleccionarEntrada(elemento, tipo) {
        // Desmarcar todos los botones
        document.querySelectorAll('.btn-precio').forEach(b => {
            b.style.borderColor = "#33334d";
            b.style.backgroundColor = "#0d0d1a";
            b.style.boxShadow = "none";
        });

        // Marcar el seleccionado con estilo Neón
        elemento.style.borderColor = "#00f2fe";
        elemento.style.backgroundColor = "rgba(0, 242, 254, 0.1)";
        elemento.style.boxShadow = "0 0 15px rgba(0, 242, 254, 0.3)";
        
        entradaSeleccionada = tipo;
        document.getElementById('tipo-entrada-seleccionada').value = tipo;
    }

    // MODIFICAR LA FUNCIÓN DE GUARDAR
    async function procesarVenta() {
        const nombre = document.getElementById('nombre-cliente').value.trim();
        const tipo = entradaSeleccionada;
        const promotor = localStorage.getItem('promotor_activo') || 'Anonimo';

        if(!nombre || !tipo) {
            alert("Por favor, escribe el nombre y selecciona una entrada.");
            return;
        }

        const codigoUnico = "TB-" + Math.random().toString(36).substr(2, 6).toUpperCase();

        const { data, error } = await _supabase
            .from('tickets')
            .insert([{ 
                codigo_qr: codigoUnico, 
                nombre_cliente: nombre, 
                tipo_entrada: tipo, 
                promotor: promotor,
                usado: false 
            }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            mostrarQR(codigoUnico, nombre, tipo);
        }
    }

    // Ejecutar al iniciar
    window.onload = cargarBotonesPrecios;
</script>
