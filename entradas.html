<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Party - Generar Ticket</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    :root {
      --bg: #050509; --card: #10101e; --accent: #00f2fe; --border: #1f1f33; --text: #ffffff; --input-bg: #080812;
    }

    body {
      font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text);
      margin: 0; display: flex; justify-content: center; padding-top: 20px;
    }

    .container {
      width: 92%; max-width: 400px; background: var(--card); padding: 25px;
      border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .subtitle { text-align: center; color: #666; font-size: 10px; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; }

    .step { display: none; animation: fadeIn 0.4s ease; }
    .active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

    .grid-precios { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-precio {
      background: var(--input-bg); border: 1px solid var(--border); padding: 20px 10px;
      border-radius: 18px; color: white; cursor: pointer; text-align: center; transition: 0.2s;
    }
    .btn-precio b { display: block; font-size: 14px; margin-bottom: 5px; }
    .btn-precio span { color: var(--accent); font-weight: bold; font-size: 15px; }

    input {
      width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 15px; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none;
    }

    .btn-main {
      width: 100%; padding: 18px; background: linear-gradient(135deg, #007aff, var(--accent));
      border: none; border-radius: 16px; color: #000; font-weight: 800; font-size: 15px; cursor: pointer; text-transform: uppercase;
    }

.btn-back { 
    display: block;
    width: 100%; 
    padding: 16px; 
    background: rgba(255, 255, 255, 0.03); /* Fondo casi invisible */
    border: 1px solid #444; /* Borde gris oscuro */
    border-radius: 16px; 
    color: #888; /* Texto gris medio */
    font-size: 12px; 
    font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    margin-top: 15px; 
    cursor: pointer; 
    transition: all 0.2s ease;
    box-sizing: border-box;
    text-align: center;
}

.btn-back:active {
    transform: scale(0.97); /* Efecto de pulsación */
    background: rgba(255, 255, 255, 0.08);
    border-color: #666;
    color: #bbb;
}

/* Un pequeño ajuste para que el botón principal y el de volver no estén pegados */
.btn-main + .btn-back {
    margin-top: 20px;
}

    /* --- ESTILO BOXES --- */
    .grid-boxes { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
    .btn-box {
        background: var(--input-bg); border: 1px solid var(--border); color: white; aspect-ratio: 1;
        display: flex; align-items: center; justify-content: center; border-radius: 50%;
        font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-box:hover { border-color: var(--accent); color: var(--accent); }
    .btn-box.ocupado { background: #222; border-color: #444; color: #444; cursor: not-allowed; opacity: 0.5; }

    /* --- ESTILO DEL TICKET FINAL --- */
    .ticket-visual {
        background: #000; border: 1px solid #222; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px;
    }
    .ticket-title { color: var(--accent); font-size: 10px; letter-spacing: 4px; margin: 0; }
    .ticket-event { font-size: 1.4rem; font-weight: 900; margin: 5px 0 20px 0; }
    
    #qrcode { background: white; padding: 12px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
    #qrcode img { display: block; }

    .ticket-data { text-align: left; border-top: 1px dashed #333; padding-top: 20px; }
    .data-item { margin-bottom: 15px; }
    .data-label { font-size: 9px; color: #666; letter-spacing: 1px; display: block; margin-bottom: 2px; }
    .data-value { font-size: 15px; font-weight: bold; text-transform: uppercase; display: block; }
    .data-accent { color: var(--accent); }

    .logo-fest-container { width: 100%; max-width: 200px; margin: 0 auto 10px; display: flex; justify-content: center; }
    .logo-fest-container img { width: 100%; filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.3)); }
  </style>
</head>
<body>

<div class="container">
    <div class="logo-fest-container">
        <img src="https://lh3.googleusercontent.com/d/1UgBxK65cJIA_iE7YSh5vFwsxSP03STke" alt="Logo">
    </div>
    <div class="subtitle" id="promotor-tag">PROMOTOR: CARGANDO...</div>

    <div id="step-1" class="step active">
        <label>Selecciona Tipo de Entrada</label>
        <div id="grid-precios" class="grid-precios"></div>
    </div>
  
    <div id="step-box" class="step">
        <label>Mapa del Evento - NEON PARTY</label>
        <div class="mapa-container" style="width: 100%; margin-bottom: 20px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border);">
            <img src="https://lh3.googleusercontent.com/d/1UgBxK65cJIA_iE7YSh5vFwsxSP03STke" alt="Mapa Boxes" style="width: 100%; display: block;">
        </div>
        <label>Selecciona un Box Disponible</label>
        <div class="grid-boxes" id="grid-boxes"></div>
        <button class="btn-back" onclick="irAPaso(1)">← Volver a entradas</button>
    </div>
  
    <div id="step-2" class="step">
        <label id="label-seleccionada" style="color: #fff; background: rgba(0,242,254,0.1); padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px dashed var(--accent);"></label>
        <input type="text" id="nombre-cliente" placeholder="Nombre completo">
        <input type="tel" id="whatsapp-cliente" placeholder="WhatsApp">
        <button class="btn-main" onclick="generarVenta()">Generar Ticket</button>
        <button class="btn-back" onclick="irAPaso(1)">← Volver</button>
    </div>

    <div id="step-3" class="step">
        <div id="ticket-visual" class="ticket-visual">
            <p class="ticket-title">BLOOM EXPERIENCE</p>
            <h2 class="ticket-event">¡TICKET GENERADO!</h2>
            <div id="qrcode"></div>
            <div class="ticket-data">
                <div class="data-item">
                    <span class="data-label">NOMBRE DEL CLIENTE</span>
                    <span id="res-nombre" class="data-value">-</span>
                </div>
                <div class="data-item">
                    <span class="data-label">ENTRADA / PRECIO</span>
                    <span id="res-tipo" class="data-value data-accent">-</span>
                </div>
                <div class="data-item">
                    <span class="data-label">FECHA DEL EVENTO</span>
                    <span class="data-value">02 DE MAYO 2026</span>
                </div>
            </div>
        </div>
        <button class="btn-main" style="background: #ffffff; color: #000; margin-bottom: 10px;" onclick="descargarPDF()">Descargar PDF</button>
        <button class="btn-main" style="background: #25D366; color: white;" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
        <button class="btn-back" onclick="window.location.replace(window.location.href)"> + Nueva Venta</button>
    </div>
</div>
  
</div>

<script>
    const SUPABASE_URL = 'https://nakrilawyrppxvjnrbks.supabase.co/'; 
    const SUPABASE_KEY = 'sb_publishable_JJGnQbTeKrQ8m02e76pZpg_nJ9lGp0m';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entradaSeleccionada = null;
    let precioSeleccionado = null;
    let datosTicket = null;
    let boxSeleccionado = null;
    const promotorLogueado = localStorage.getItem('promotor_activo') || "Invitado";

    document.getElementById('promotor-tag').innerText = "PROMOTOR: " + promotorLogueado.toUpperCase();

  

    async function cargarPrecios() {
        const grid = document.getElementById('grid-precios');
        const { data, error } = await _supabase.from('precios').select('*').order('precio', { ascending: true });
        if (error) return;
        grid.innerHTML = "";
        data.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'btn-precio';
            btn.innerHTML = `<b>${p.tipo_entrada}</b><span>S/ ${p.precio}</span>`;
            btn.onclick = () => {
                entradaSeleccionada = p.tipo_entrada;
                precioSeleccionado = p.precio;
                if (p.tipo_entrada.toUpperCase().includes("BOX")) {
                    generarGridBoxes();
                    irAPaso('box');
                } else {
                    boxSeleccionado = null;
                    document.getElementById('label-seleccionada').innerText = p.tipo_entrada + " - S/ " + p.precio;
                    irAPaso(2);
                }
            };
            grid.appendChild(btn);
        });
    }

    function irAPaso(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const target = n === 'box' ? 'step-box' : 'step-' + n;
        document.getElementById(target).classList.add('active');
    }

    async function generarGridBoxes() {
        const grid = document.getElementById('grid-boxes');
        grid.innerHTML = "<p style='grid-column: span 5; text-align:center; font-size:10px;'>Verificando disponibilidad...</p>";

        const { data: listaBoxes, error } = await _supabase.from('boxes').select('*').order('numero_box', { ascending: true });

        grid.innerHTML = "";
        if (error) return grid.innerHTML = "Error al cargar boxes";

        listaBoxes.forEach(box => {
            const btn = document.createElement('div');
            btn.className = 'btn-box' + (box.estado === 'ocupado' ? ' ocupado' : '');
            btn.innerText = box.numero_box;

            if (box.estado !== 'ocupado') {
                btn.onclick = () => {
                    boxSeleccionado = box.numero_box;
                    document.getElementById('label-seleccionada').innerText = `${entradaSeleccionada} - BOX ${box.numero_box} - S/ ${precioSeleccionado}`;
                    irAPaso(2);
                };
            }
            grid.appendChild(btn);
        });
    }

async function generarVenta() {
    const nombre = document.getElementById('nombre-cliente').value.trim().toUpperCase();
    const whatsapp = document.getElementById('whatsapp-cliente').value.trim();

    if (!nombre || !whatsapp) return alert("Completa los datos del cliente");

    const codigoNuevo = generarCodigoSeguro();
    const tipoFinal = boxSeleccionado ? `BOX ${boxSeleccionado}` : entradaSeleccionada;

    // 1. Guardar en Supabase
    const { data, error } = await _supabase.from('tickets').insert([{
        codigo_qr: codigoNuevo,
        nombre_cliente: nombre,
        whatsapp: whatsapp,
        tipo_entrada: tipoFinal,
        promotor: promotorLogueado,
        usado: false
    }]).select();

    if (error) return alert("Error al guardar en la base de datos.");

    if (data && data.length > 0) {
        // 2. Bloquear el Box si aplica
        if (boxSeleccionado) {
            await _supabase.from('boxes').update({ estado: 'ocupado' }).eq('numero_box', boxSeleccionado);
        }

        // 3. Guardar datos en la variable global para el PDF
        datosTicket = { nombre, codigo: codigoNuevo, whatsapp, entrada: tipoFinal, precio: precioSeleccionado };

        // 4. Llenar Interfaz Visual (Paso 3)
        document.getElementById('res-nombre').innerText = nombre;
        document.getElementById('res-tipo').innerText = `${tipoFinal} - S/ ${precioSeleccionado}`;
        
        // 5. Llenar Template del PDF (El que creamos al final del body)
        document.getElementById('pdf-nombre').innerText = nombre;
        document.getElementById('pdf-tipo').innerText = `${tipoFinal} - S/ ${precioSeleccionado}`;

        // 6. Cambiar de paso
        irAPaso(3);

        // 7. Generar QR para la Pantalla (Celular)
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { 
            text: codigoNuevo, 
            width: 160, 
            height: 160, 
            correctLevel: QRCode.CorrectLevel.H 
        });

        // 8. Generar QR para el PDF (Oculto)
        const qrPDF = document.getElementById("qrcode-pdf");
        qrPDF.innerHTML = "";
        new QRCode(qrPDF, { 
            text: codigoNuevo, 
            width: 200, // Un poco más grande para mejor calidad en PDF
            height: 200, 
            correctLevel: QRCode.CorrectLevel.H 
        });
    }
}

async function descargarPDF() {
    const elemento = document.getElementById('ticket-pdf-template');
    
    const opciones = {
        margin: 0,
        filename: `Ticket_Bloom_${datosTicket.nombre.replace(/\s+/g, '_')}.pdf`,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { 
            scale: 3, 
            useCORS: true, 
            backgroundColor: '#000000',
            width: 400
        },
        jsPDF: { unit: 'mm', format: [105, 185], orientation: 'portrait' } 
    };

    // Damos 500ms para asegurar que el logo y el QR estén listos
    setTimeout(() => {
        html2pdf().set(opciones).from(elemento).save();
    }, 500);
}

    function enviarWhatsApp() {
        const mensaje = `¡Hola ${datosTicket.nombre}! Confirmo tu entrada para Neon Party.%0A%0A*Tipo:* ${datosTicket.entrada}%0A*Fecha:* 02 de Mayo 2026%0A%0APresenta el QR que te acabo de enviar.`;
        window.open(`https://wa.me/${datosTicket.whatsapp.replace(/\D/g,'')}?text=${mensaje}`, '_blank');
    }

    function generarCodigoSeguro() {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let aleatorio = '';
        for (let i = 0; i < 10; i++) aleatorio += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        return `NP-${Date.now().toString(36).toUpperCase()}-${aleatorio}`;
    }

    // 1. Bloqueo de seguridad al cargar la página
window.onload = async () => {
    // Si no hay promotor, mandarlo al login de inmediato
    if (!localStorage.getItem('promotor_activo')) {
        window.location.replace('index.html'); 
        return;
    }

    // Actualizamos el nombre del promotor en la interfaz
    const promotor = localStorage.getItem('promotor_activo');
    document.getElementById('promotor-tag').innerText = "PROMOTOR: " + promotor.toUpperCase();

    // BLOQUEO DEL BOTÓN ATRÁS (Evita volver al login trabado)
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
    };

    // Llamamos a cargar los precios
    await cargarPrecios();
};
</script>
</body>
</html>
