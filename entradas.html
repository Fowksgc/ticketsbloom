<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TicketsBloom - Generar Ticket</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    :root {
      --bg: #050509; --card: #10101e; --accent: #00f2fe; --border: #1f1f33; --text: #ffffff; --input-bg: #080812;
    }

    body {
      font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text);
      margin: 0; display: flex; justify-content: center; padding-top: 20px;
    }

    .container {
      width: 92%; max-width: 400px; background: var(--card); padding: 25px;
      border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    h2 { color: var(--accent); text-align: center; letter-spacing: 3px; font-size: 1.3rem; margin: 0; }
    .subtitle { text-align: center; color: #666; font-size: 10px; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; }

    .step { display: none; animation: fadeIn 0.4s ease; }
    .active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

    .grid-precios { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-precio {
      background: var(--input-bg); border: 1px solid var(--border); padding: 20px 10px;
      border-radius: 18px; color: white; cursor: pointer; text-align: center; transition: 0.2s;
    }
    .btn-precio b { display: block; font-size: 14px; margin-bottom: 5px; }
    .btn-precio span { color: var(--accent); font-weight: bold; font-size: 15px; }

    input {
      width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 15px; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none;
    }
    input:focus { border-color: var(--accent); }

    .btn-main {
      width: 100%; padding: 18px; background: linear-gradient(135deg, #007aff, var(--accent));
      border: none; border-radius: 16px; color: #000; font-weight: 800; font-size: 15px; cursor: pointer; text-transform: uppercase;
    }

    .btn-back {
      background: none; border: none; color: #666; font-size: 12px; width: 100%; margin-top: 15px; cursor: pointer;
    }

    #qr-result { text-align: center; }
    #qrcode { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
    .info-final { font-size: 14px; line-height: 1.6; border-top: 1px solid #333; padding-top: 15px; }

    .logo-fest-container {
        width: 100%; max-width: 250px; height: auto; margin: 20px auto 10px;
        display: flex; justify-content: center; align-items: center;
    }

    .logo-fest-container img {
        width: 100%; height: auto; object-fit: contain;
        filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.4));
    }

    /* Estilos para el botón de PDF */
    .btn-pdf {
        background: #333; color: white; margin-top: 10px; border: 1px solid #444;
    }
  </style>
</head>
<body>

<div class="container">
   <div class="logo-fest-container">
    <img src="https://lh3.googleusercontent.com/d/1UgBxK65cJIA_iE7YSh5vFwsxSP03STke" alt="Logo Fiesta">
   </div>
  
    <div class="subtitle" id="promotor-tag">PROMOTOR: CARGANDO...</div>

    <div id="step-1" class="step active">
        <label>Selecciona Tipo de Entrada</label>
        <div id="grid-precios" class="grid-precios"></div>
    </div>

    <div id="step-2" class="step">
        <label id="label-seleccionada" style="color: #fff; background: rgba(0,242,254,0.1); padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px dashed var(--accent);"></label>
        
        <label>Nombre Completo</label>
        <input type="text" id="nombre-cliente" placeholder="Nombre del cliente">

        <label>WhatsApp</label>
        <input type="tel" id="whatsapp-cliente" placeholder="Número">

        <button class="btn-main" onclick="generarVenta()">Finalizar y Crear QR</button>
        <button class="btn-back" onclick="irAPaso(1)">← Cambiar tipo de entrada</button>
    </div>

    <div id="step-3" class="step">
        <div id="qr-result">
            <div id="qrcode"></div>
            <div class="info-final" id="info-final"></div>
            
            <button class="btn-main" style="background: #ffffff; color: black; margin-top: 15px;" onclick="descargarPDF()">Descargar PDF 📄</button>
            <button class="btn-main" style="background: #25D366; color: white; margin-top: 10px;" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
            
            <button class="btn-back" onclick="location.reload()">+ Nueva Venta</button>
        </div>
    </div>
</div>

<div id="ticket-a-pdf" style="display:none; position: absolute; left: -9999px;">
    <div style="background: #000; color: #fff; width: 320px; padding: 30px; border-radius: 20px; font-family: Arial, sans-serif; text-align: center;">
        <p style="color: #00f2fe; font-size: 11px; letter-spacing: 3px; margin: 0;">TICKET GENERADO</p>
        <h2 style="margin: 10px 0; font-size: 22px;">ZENTO EVENTOS</h2>
        
        <div style="background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin: 20px 0;">
            <img id="qr-pdf-img" src="" style="width: 180px; height: 180px; display: block;">
        </div>

        <div style="text-align: left; padding: 0 10px;">
            <div style="margin-bottom: 12px;">
                <label style="color: #666; font-size: 9px; display: block; letter-spacing: 1px;">NOMBRE COMPLETO</label>
                <span id="pdf-nombre" style="font-weight: bold; text-transform: uppercase; font-size: 16px;">-</span>
            </div>
            <div style="margin-bottom: 12px;">
                <label style="color: #666; font-size: 9px; display: block; letter-spacing: 1px;">TIPO DE ENTRADA</label>
                <span id="pdf-tipo" style="font-weight: bold; text-transform: uppercase; font-size: 16px; color: #00f2fe;">-</span>
            </div>
            <div>
                <label style="color: #666; font-size: 9px; display: block; letter-spacing: 1px;">FECHA DEL EVENTO</label>
                <span style="font-weight: bold; font-size: 16px;">02 DE MAYO, 2026</span>
            </div>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 15px;">
            <code id="pdf-codigo" style="font-family: monospace; color: #444; font-size: 10px;">-</code>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://nakrilawyrppxvjnrbks.supabase.co/'; 
    const SUPABASE_KEY = 'sb_publishable_JJGnQbTeKrQ8m02e76pZpg_nJ9lGp0m';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entradaSeleccionada = null;
    let datosTicket = null;
    const promotorLogueado = localStorage.getItem('promotor_activo');

    if (!promotorLogueado) {
        alert("Acceso denegado. Por favor, inicia sesión.");
        window.location.href = 'index.html'; 
    }

    document.getElementById('promotor-tag').innerText = "PROMOTOR: " + promotorLogueado.toUpperCase();

    async function cargarPrecios() {
        const grid = document.getElementById('grid-precios');
        const { data, error } = await _supabase.from('precios').select('*').order('precio', { ascending: true });
        if (error) return grid.innerHTML = "<p>Error</p>";
        grid.innerHTML = "";
        data.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'btn-precio';
            btn.innerHTML = `<b>${p.tipo_entrada}</b><span>S/ ${p.precio}</span>`;
            btn.onclick = () => {
                entradaSeleccionada = p.tipo_entrada;
                document.getElementById('label-seleccionada').innerText = "ENTRADA: " + p.tipo_entrada.toUpperCase();
                irAPaso(2);
            };
            grid.appendChild(btn);
        });
    }

    function irAPaso(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-' + n).classList.add('active');
    }

    async function generarVenta() {
        const nombreRaw = document.getElementById('nombre-cliente').value.trim();
        const whatsapp = document.getElementById('whatsapp-cliente').value.trim();
        const nombre = nombreRaw.toUpperCase();

        if(!nombre || !whatsapp) return alert("Completa todos los datos");

        const codigoNuevo = generarCodigoSeguro();

        const { data, error } = await _supabase.from('tickets').insert([{
            codigo_qr: codigoNuevo,
            nombre_cliente: nombre,
            whatsapp: whatsapp,
            tipo_entrada: entradaSeleccionada,
            promotor: promotorLogueado,
            usado: false
        }]).select(); 

        if (error) {
            console.error(error);
            return alert("Error al generar el ticket.");
        }

        if (data && data.length > 0) {
            datosTicket = { 
                nombre, 
                codigo: codigoNuevo, 
                whatsapp, 
                entrada: entradaSeleccionada 
            };

            irAPaso(3);
            
            // Generar QR visual en Paso 3
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, { 
                text: codigoNuevo, 
                width: 180, 
                height: 180,
                correctLevel : QRCode.CorrectLevel.H
            });

            // Llenar info visual en Paso 3
            document.getElementById('info-final').innerHTML = `
                <b>${nombre}</b><br>
                <span style="color:var(--accent); font-size:12px;">${entradaSeleccionada}</span>
            `;

            // Llenar el contenedor oculto para el PDF
            document.getElementById('pdf-nombre').innerText = nombre;
            document.getElementById('pdf-tipo').innerText = entradaSeleccionada;
            document.getElementById('pdf-codigo').innerText = codigoNuevo;
            // Usar API externa para que html2pdf capture el QR como imagen
            document.getElementById('qr-pdf-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${codigoNuevo}`;
        }
    }

    function descargarPDF() {
        const elemento = document.getElementById('ticket-a-pdf');
        elemento.style.display = 'block'; // Mostrar momentáneamente para capturar

        const opciones = {
            margin: 0,
            filename: `Ticket_${datosTicket.nombre}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3, backgroundColor: '#000000' },
            jsPDF: { unit: 'mm', format: [95, 150], orientation: 'portrait' }
        };

        html2pdf().set(opciones).from(elemento).save().then(() => {
            elemento.style.display = 'none'; // Volver a ocultar
        });
    }

    function enviarWhatsApp() {
        const mensaje = `¡Hola ${datosTicket.nombre}! Aquí tienes tu entrada para el evento.%0A%0A*Ticket:* ${datosTicket.entrada}%0A%0APresenta este código QR en la puerta.`;
        const url = `https://wa.me/${datosTicket.whatsapp.replace(/\D/g,'')}?text=${mensaje}`;
        window.open(url, '_blank');
    }

    function generarCodigoSeguro() {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let aleatorio = '';
        for (let i = 0; i < 12; i++) {
            aleatorio += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        const timestamp = Date.now().toString(36).toUpperCase(); 
        return `NP-${timestamp}-${aleatorio}`;
    }

    window.onload = cargarPrecios;
</script>

</body>
</html>
