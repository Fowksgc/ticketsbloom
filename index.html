<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TicketsBloom - Acceso Promotores</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* --- VARIABLES DE DISEÑO FOWKS STUDIO --- */
    :root {
      --bg-color: #050509; /* Fondo ultra oscuro */
      --card-color: #10101e; /* Color de la tarjeta */
      --accent-color: #00f2fe; /* Neón cyan */
      --accent-glow: rgba(0, 242, 254, 0.3);
      --text-main: #ffffff;
      --text-muted: #666680;
      --border-color: #1f1f33;
      --input-bg: #080812;
      --error-color: #ff4d4d;
    }

    /* --- ESTILOS BASE --- */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden; /* Evita scroll innecesario */
    }

    /* --- TARJETA DE LOGIN --- */
    .login-card {
      width: 90%;
      max-width: 360px;
      background-color: var(--card-color);
      padding: 40px 30px;
      border-radius: 28px;
      border: 1px solid var(--border-color);
      box-shadow: 0 25px 50px rgba(0,0,0,0.8);
      text-align: center;
      position: relative;
    }

    /* Efecto de brillo sutil en la parte superior */
    .login-card::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%; transform: translateX(-50%);
      width: 40%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
      box-shadow: 0 0 15px var(--accent-color);
    }

    /* --- CABECERA --- */
    .header h1 {
      color: var(--accent-color);
      letter-spacing: 5px;
      margin: 0 0 10px 0;
      font-size: 1.6rem;
      text-transform: uppercase;
      font-weight: 900;
      text-shadow: 0 0 15px var(--accent-glow);
    }

    .header p {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0 0 35px 0;
      letter-spacing: 1px;
    }

    /* --- GRUPOS DE INPUTS --- */
    .input-group {
      text-align: left;
      margin-bottom: 22px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      color: var(--accent-color);
      margin-bottom: 8px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1.5px;
      opacity: 0.8;
    }

    /* --- ESTILO DE LOS INPUTS DE TEXTO Y PASSWORD --- */
    .input-group input {
      width: 100%;
      padding: 16px 18px;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      color: var(--text-main);
      font-size: 16px; /* Evita zoom automático en iOS */
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    /* Efecto Focus en Inputs */
    .input-group input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 12px var(--accent-glow);
      background-color: #0a0a1a;
    }

    /* Iconos visuales opcionales (puedes quitarlos si prefieres) */
    .input-group::after {
      font-size: 14px;
      color: var(--text-muted);
      position: absolute;
      right: 18px;
      top: 38px; /* Ajustado para estar centrado verticalmente con el input */
      opacity: 0.5;
    }
    
    /* Input de usuario icono (U) */
    #user-group::after { content: '👤'; }
    /* Input de password icono (P) */
    #pass-group::after { content: '🔒'; }


    /* --- BOTÓN DE LOGIN --- */
    .btn-login {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #007aff 0%, var(--accent-color) 100%);
      border: none;
      border-radius: 16px;
      color: #000;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 15px;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
    }

    .btn-login:hover {
      box-shadow: 0 12px 25px rgba(0, 242, 254, 0.3);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 5px 10px rgba(0, 242, 254, 0.2);
    }

    /* --- MENSAJE DE ERROR --- */
    .error-container {
      margin-top: 15px;
      min-height: 20px; /* Evita que el layout salte */
    }

    #error-msg {
      color: var(--error-color);
      font-size: 12px;
      display: none; /* Oculto por defecto */
      font-weight: 600;
      background-color: rgba(255, 77, 77, 0.1);
      padding: 8px;
      border-radius: 8px;
    }

  </style>
</head>
<body>

  <div class="login-card">
    
    <div class="logo-container">
      <img src="https://drive.google.com/file/d/1sFvN2X92aCt9ijXNxqKCETiFsEyrvDy3/view?usp=sharing" alt="TicketsBloom Logo">
    </div>

    <h2>ACCESO EXCLUSIVO • PROMOTORES</h2>
    <div class="subtitle">ACCESO EXCLUSIVO • PROMOTORES</div>
    <div class="input-group" id="user-group">
      
      <label for="user-input">Usuario</label>
      <input type="text" id="user-input" placeholder="Usuario" autocomplete="username">
    </div>

    <div class="input-group" id="pass-group">
      <label for="pass-input">Contraseña</label>
      <input type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button id="btn-entrar" class="btn-login" onclick="validarLogin()">Ingresar al Sistema</button>
    
    <div class="error-container">
        <div id="error-msg">
            Error: Usuario o contraseña incorrectos.
        </div>
    </div>
  </div>

  <script>
    // --- CONFIGURACIÓN DE SUPABASE ---
    // REEMPLAZA ESTOS VALORES CON TUS LLAVES REALES
    const SUPABASE_URL = 'https://nakrilawyrppxvjnrbks.supabase.co/'; 
    const SUPABASE_KEY = 'sb_publishable_JJGnQbTeKrQ8m02e76pZpg_nJ9lGp0m'; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- LÓGICA DE LOGIN ---
    async function validarLogin() {
        const user = document.getElementById('user-input').value.trim();
        const pass = document.getElementById('pass-input').value.trim();
        const btn = document.getElementById('btn-entrar');
        const errorMsg = document.getElementById('error-msg');

        // Resetear estado
        errorMsg.style.display = "none";
        
        if (!user || !pass) {
            alert("Por favor, completa ambos campos.");
            return;
        }

        // Estado de carga
        btn.innerText = "VERIFICANDO...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        try {
            // Consultamos en Supabase si existe esa combinación exacta
            const { data: promotor, error } = await _supabase
                .from('promotores')
                .select('nombre, usuario, activo')
                .eq('usuario', user)
                .eq('password', pass) // Ojo: En producción esto debería estar encriptado
                .eq('activo', true)
                .single(); // Esperamos un solo resultado

            if (error || !promotor) {
                throw new Error("Credenciales inválidas");
            }

            // LOGIN EXITOSO
            // Guardamos el nombre real del promotor en el navegador
            localStorage.setItem('promotor_activo', promotor.nombre);
            // Redirigimos a la pantalla de ventas
            window.location.href = "vender.html";

        } catch (e) {
            // LOGIN FALLIDO
            console.error(e.message);
            btn.innerText = "INGRESAR AL SISTEMA";
            btn.style.opacity = "1";
            btn.disabled = false;
            errorMsg.style.display = "block";
            
            // Feedback visual de error en los inputs
            document.getElementById('user-input').style.borderColor = "var(--error-color)";
            document.getElementById('pass-input').style.borderColor = "var(--error-color)";
            
            // Limpiar password
            document.getElementById('pass-input').value = "";
        }
    }
    
    // Permitir login al presionar 'Enter'
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            validarLogin();
        }
    });
  </script>
</body>
</html>
