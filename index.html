<div class="login-card">
    <h1>TICKETSBLOOM</h1>
    <p>Acceso Privado - Fowks Studio</p>

    <div class="input-group">
      <label>Usuario</label>
      <input type="text" id="user-input" placeholder="Tu usuario">
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" id="pass-input" placeholder="••••••••">
    </div>

    <button id="btn-entrar" class="btn-login" onclick="validarLogin()">Ingresar al Sistema</button>
    
    <div id="error-msg" style="color: #ff6b6b; font-size: 12px; margin-top: 10px; display: none;">
        Usuario o contraseña incorrectos
    </div>
</div>

<script>
    // Configuración (Usa tus mismas llaves)
    const SUPABASE_URL = 'TU_URL_AQUÍ'; 
    const SUPABASE_KEY = 'TU_KEY_ANON_AQUÍ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function validarLogin() {
        const user = document.getElementById('user-input').value;
        const pass = document.getElementById('pass-input').value;
        const btn = document.getElementById('btn-entrar');
        const errorMsg = document.getElementById('error-msg');

        if (!user || !pass) return alert("Completa todos los campos");

        btn.innerText = "Verificando...";
        errorMsg.style.display = "none";

        // Consultamos en Supabase si existe esa combinación
        const { data: promotor, error } = await _supabase
            .from('promotores')
            .select('nombre, usuario, activo')
            .eq('usuario', user)
            .eq('password', pass)
            .eq('activo', true)
            .single();

        if (error || !promotor) {
            btn.innerText = "Ingresar al Sistema";
            errorMsg.style.display = "block";
            return;
        }

        // Si todo está bien, guardamos su nombre real y entramos
        localStorage.setItem('promotor_activo', promotor.nombre);
        window.location.href = "vender.html";
    }
</script>
