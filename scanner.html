<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TicketsBloom - Scanner Fix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root { --bg: #050509; --accent: #00f2fe; --card: #10101e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        /* FUERZA AL CONTENEDOR A TENER ALTURA */
        #container-cam { 
            position: relative; 
            width: 100%; 
            height: 70vh; /* 70% de la pantalla */
            background: #000; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #1f1f33;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Importante para que no se deforme */
            display: block;
        }

        .scanner-overlay { 
            position: absolute; width: 200px; height: 200px; 
            border: 2px solid var(--accent); border-radius: 20px; 
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); pointer-events: none; 
            z-index: 5;
        }
        
        .btn-init { 
            background: var(--accent); color: #000; border: none; padding: 20px; 
            width: 80%; border-radius: 15px; font-weight: 800; margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,242,254,0.3);
        }

        #result-box { 
            position: fixed; bottom: 20px; left: 5%; width: 90%; 
            padding: 20px; border-radius: 20px; background: var(--card); 
            display: none; z-index: 100; border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="container-cam">
        <video id="video" autoplay muted playsinline></video>
        <div class="scanner-overlay"></div>
    </div>

    <button id="btn-start" class="btn-init" onclick="initCamara()">ACTIVAR ESCÁNER</button>

    <div id="result-box">
        <div id="res-status" style="font-size:10px; color:#888;">ESTADO</div>
        <div id="res-name" style="font-size:20px; font-weight:bold;">---</div>
        <div id="res-type" style="color:var(--accent);">---</div>
    </div>

    <script>
        const SUPABASE_URL = 'TU_URL_AQUÍ'; 
        const SUPABASE_KEY = 'TU_KEY_ANON_AQUÍ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const video = document.getElementById("video");
        const canvasElement = document.createElement("canvas");
        const canvas = canvasElement.getContext("2d");
        let scanning = false;

        async function initCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                
                video.srcObject = stream;
                
                // FORZAMOS LA REPRODUCCIÓN (Esto es lo que te faltaba)
                video.onloadedmetadata = () => {
                    video.play();
                    scanning = true;
                    document.getElementById('btn-start').style.display = 'none';
                    requestAnimationFrame(tick);
                };
            } catch (err) {
                alert("Error de cámara: " + err.message);
            }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                if (code) {
                    scanning = false;
                    validarTicket(code.data);
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        async function validarTicket(codigo) {
            const box = document.getElementById('result-box');
            box.style.display = 'block';
            document.getElementById('res-name').innerText = codigo.split('|')[0];

            try {
                const { data, error } = await _supabase.from('tickets').select('*').eq('codigo_qr', codigo).single();

                if (error || !data) {
                    showUI(false, "INVÁLIDO");
                } else if (data.usado) {
                    showUI(false, "YA USADO");
                } else {
                    await _supabase.from('tickets').update({ usado: true }).eq('codigo_qr', codigo);
                    showUI(true, data.tipo_entrada);
                }
            } catch (e) { showUI(false, "ERROR RED"); }

            setTimeout(() => { box.style.display = 'none'; scanning = true; requestAnimationFrame(tick); }, 3000);
        }

        function showUI(ok, detail) {
            const box = document.getElementById('result-box');
            box.style.background = ok ? "#00ff88" : "#ff4d4d";
            box.style.color = ok ? "#000" : "#fff";
            document.getElementById('res-type').innerText = detail;
            if (navigator.vibrate) navigator.vibrate(ok ? 200 : [100, 50, 100]);
        }
    </script>
</body>
</html>
