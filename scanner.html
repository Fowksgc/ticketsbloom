<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Scanner Pro - Bloom</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root { 
            --bg: #050509; --accent: #00f2fe; --card: #10101e; 
            --success: #00ff88; --error: #ff4d4d;
        }

        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            color: white; margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
        }
        
        #container-cam { 
            position: relative; width: 100%; height: 45vh; background: #000; 
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid #1f1f33;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scanner-overlay { 
            position: absolute; width: 200px; height: 200px; 
            border: 3px solid var(--accent); border-radius: 25px; 
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.65); z-index: 5;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        #result-info { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }

        .card-asistente {
            width: 90%; padding: 25px 15px; border-radius: 24px;
            background: var(--card); border: 2px solid #222;
            text-align: center; transition: all 0.3s ease;
        }

        .res-status { 
            font-size: 28px; font-weight: 900; letter-spacing: 1px; 
            text-transform: uppercase; margin-bottom: 10px; display: block;
        }

        .res-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .res-type { font-size: 16px; font-weight: 500; opacity: 0.8; }

        .footer-action {
            padding: 30px 20px; display: flex; justify-content: center; background: var(--bg);
        }

        .btn-main { 
            background: var(--accent); color: #000; border: none; 
            padding: 20px; width: 100%; max-width: 350px;
            border-radius: 20px; font-weight: 900; font-size: 16px; 
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 0px #00a8b1;
            transition: all 0.1s;
        }

        .btn-main:active { transform: translateY(4px); box-shadow: 0 4px 0px #00a8b1; }

        #btn-next { display: none; background: #fff; box-shadow: 0 8px 0px #bbb; }
        #btn-next:active { box-shadow: 0 4px 0px #bbb; }

        .pulse { animation: pulse-ani 0.5s infinite alternate; }
        @keyframes pulse-ani { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div id="container-cam">
        <video id="video" autoplay muted playsinline></video>
        <div id="overlay" class="scanner-overlay"></div>
    </div>

    <div id="result-info">
        <div class="card-asistente" id="card-ui">
            <span id="res-status" class="res-status" style="color:#444;">ESPERANDO...</span>
            <div id="res-name" class="res-name">Listo para escanear</div>
            <div id="res-type" class="res-type">Neon Party 2026</div>
        </div>
    </div>

    <div class="footer-action">
        <button id="btn-start" class="btn-main" onclick="initCamara()">ACTIVAR CÁMARA</button>
        <button id="btn-next" class="btn-main" onclick="resetScanner()">SIGUIENTE TICKET</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://nakrilawyrppxvjnrbks.supabase.co/'; 
        const SUPABASE_KEY = 'sb_publishable_JJGnQbTeKrQ8m02e76pZpg_nJ9lGp0m';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let video, canvasElement, canvas, scanning = false;

        document.addEventListener("DOMContentLoaded", () => {
            video = document.getElementById("video");
            canvasElement = document.createElement("canvas");
            canvas = canvasElement.getContext("2d");
        });

        async function initCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    scanning = true;
                    // Forzamos la desaparición del botón
                    document.getElementById('btn-start').style.setProperty('display', 'none', 'important');
                    requestAnimationFrame(tick);
                };
            } catch (err) {
                alert("Error: Activa los permisos de cámara.");
            }
        }

        function tick() {
            if (video && video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                if (code) {
                    scanning = false;
                    validarTicket(code.data);
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        async function validarTicket(codigo) {
            const statusTxt = document.getElementById('res-status');
            const nameTxt = document.getElementById('res-name');
            const overlay = document.getElementById('overlay');

            overlay.style.display = "none";
            statusTxt.innerText = "VERIFICANDO...";
            statusTxt.style.color = "#fff";

            try {
                const { data, error } = await _supabase.from('tickets').select('*').eq('codigo_qr', codigo).single();

                if (error || !data) {
                    renderUI(false, "INVÁLIDO", "TICKET NO EXISTE");
                    nameTxt.innerText = "ERROR DE LECTURA";
                } 
                else if (data.usado) {
                    renderUI(false, "DENEGADO", "YA ENTRÓ AL EVENTO");
                    nameTxt.innerText = data.nombre_cliente;
                } 
                else {
                    await _supabase.from('tickets').update({ usado: true }).eq('codigo_qr', codigo);
                    renderUI(true, "PERMITIDO", data.tipo_entrada);
                    nameTxt.innerText = data.nombre_cliente;
                }
            } catch (e) {
                renderUI(false, "ERROR", "SIN CONEXIÓN");
            }
            document.getElementById('btn-next').style.display = 'block';
        }

        function resetScanner() {
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('overlay').style.display = "block";
            document.getElementById('card-ui').style.borderColor = "#222";
            document.getElementById('card-ui').classList.remove('pulse');
            document.getElementById('res-status').innerText = "ESPERANDO...";
            document.getElementById('res-status').style.color = "#444";
            document.getElementById('res-name').innerText = "Listo para escanear";
            scanning = true;
            requestAnimationFrame(tick);
        }

        function renderUI(ok, status, detail) {
            const card = document.getElementById('card-ui');
            const statusTxt = document.getElementById('res-status');
            const color = ok ? "#00ff88" : "#ff4d4d"; // Colores fijos en JS para evitar errores
            
            card.style.borderColor = color;
            card.classList.add('pulse');
            
            statusTxt.innerText = status;
            statusTxt.style.color = color;
            
            document.getElementById('res-type').innerText = detail;
            if (navigator.vibrate) ok ? navigator.vibrate(200) : navigator.vibrate([100, 50, 100]);
        }
    </script>
</body>
</html>
