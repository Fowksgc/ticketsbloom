<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Scanner Pro - Bloom</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root { 
            --bg: #050509; --accent: #00f2fe; --card: #10101e; 
            --success: #00ff88; --error: #ff4d4d;
        }

        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            color: white; margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
        }
        
        /* 1. LA CÁMARA (Ocupa la parte superior) */
        #container-cam { 
            position: relative; width: 100%; height: 50vh; background: #000; 
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #1f1f33;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scanner-overlay { 
            position: absolute; width: 180px; height: 180px; 
            border: 2px dashed rgba(0, 242, 254, 0.5); border-radius: 20px; 
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); z-index: 5;
        }

        /* 2. INFORMACIÓN DEL ÚLTIMO ASISTENTE */
        #result-info { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            padding: 20px; background: var(--bg);
        }

        .card-asistente {
            width: 90%; padding: 20px; border-radius: 20px;
            background: var(--card); border: 1px solid #222;
            min-height: 120px; display: flex; flex-direction: column;
            justify-content: center;
        }

        .res-status { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        .res-name { font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; color: #fff; }
        .res-type { font-size: 14px; font-weight: 600; color: var(--accent); }

        /* 3. BOTÓN DE ESCANEAR DE NUEVO */
        .footer-action {
            padding: 20px; display: flex; justify-content: center;
            background: var(--bg);
        }

        .btn-main { 
            background: var(--accent); color: #000; border: none; 
            padding: 18px; width: 90%; max-width: 350px;
            border-radius: 15px; font-weight: 900; font-size: 14px; 
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,242,254,0.2);
            transition: 0.3s;
        }

        #btn-next { display: none; background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="container-cam">
        <video id="video" autoplay muted playsinline></video>
        <div id="overlay" class="scanner-overlay"></div>
    </div>

    <div id="result-info">
        <div class="card-asistente" id="card-ui">
            <div id="res-status" class="res-status">Esperando escaneo...</div>
            <div id="res-name" class="res-name">---</div>
            <div id="res-type" class="res-type">---</div>
        </div>
    </div>

    <div class="footer-action">
        <button id="btn-start" class="btn-main" onclick="initCamara()">ACTIVAR CÁMARA</button>
        <button id="btn-next" class="btn-main" onclick="resetScanner()">ESCANEAR DE NUEVO</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://nakrilawyrppxvjnrbks.supabase.co/'; 
        const SUPABASE_KEY = 'sb_publishable_JJGnQbTeKrQ8m02e76pZpg_nJ9lGp0m';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let video, canvasElement, canvas, scanning = false;

        document.addEventListener("DOMContentLoaded", () => {
            video = document.getElementById("video");
            canvasElement = document.createElement("canvas");
            canvas = canvasElement.getContext("2d");
        });

        async function initCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    scanning = true;
                    document.getElementById('btn-start').style.display = 'none';
                    requestAnimationFrame(tick);
                };
            } catch (err) {
                alert("Activa permisos de cámara.");
            }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                if (code) {
                    scanning = false;
                    validarTicket(code.data);
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        async function validarTicket(codigo) {
            const card = document.getElementById('card-ui');
            const nameTxt = document.getElementById('res-name');
            const overlay = document.getElementById('overlay');

            overlay.style.borderColor = "transparent";
            nameTxt.innerText = "VERIFICANDO...";

            try {
                const { data, error } = await _supabase.from('tickets').select('*').eq('codigo_qr', codigo).single();

                if (error || !data) {
                    renderUI(false, "INVÁLIDO", "TICKET NO EXISTE");
                    nameTxt.innerText = "ERROR QR";
                } 
                else if (data.usado) {
                    renderUI(false, "DENEGADO", "YA INGRESÓ AL EVENTO");
                    nameTxt.innerText = data.nombre_cliente;
                } 
                else {
                    await _supabase.from('tickets').update({ usado: true }).eq('codigo_qr', codigo);
                    renderUI(true, "PERMITIDO", data.tipo_entrada);
                    nameTxt.innerText = data.nombre_cliente;
                }
            } catch (e) {
                renderUI(false, "ERROR", "REVISA CONEXIÓN");
            }
            document.getElementById('btn-next').style.display = 'block';
        }

        function resetScanner() {
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('overlay').style.borderColor = "rgba(0, 242, 254, 0.5)";
            scanning = true;
            requestAnimationFrame(tick);
        }

        function renderUI(ok, status, detail) {
            const card = document.getElementById('card-ui');
            card.style.borderColor = ok ? "#00ff88" : "#ff4d4d";
            document.getElementById('res-status').innerText = status;
            document.getElementById('res-status').style.color = ok ? "#00ff88" : "#ff4d4d";
            document.getElementById('res-type').innerText = detail;
            if (navigator.vibrate) ok ? navigator.vibrate(200) : navigator.vibrate([100, 50, 100]);
        }
    </script>
</body>
</html>
