<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TicketsBloom - Scanner Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --bg: #050509; --card: #10101e; --accent: #00f2fe; --border: #1f1f33; --success: #00ff88; --error: #ff4d4d; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #reader { width: 100%; max-width: 350px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; min-height: 250px; }
    .btn-start { background: var(--accent); border: none; padding: 15px; border-radius: 12px; color: #000; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
    .result-card { margin-top: 20px; width: 100%; max-width: 350px; padding: 20px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); text-align: center; }
    select { width: 100%; padding: 10px; background: #111; color: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

  <h2 style="color:var(--accent); letter-spacing:3px;">TICKETSBLOOM</h2>
  
  <select id="camera-select"></select>
  
  <div id="reader"></div>
  
  <button id="btn-iniciar" class="btn-start" onclick="prepararCamara()">ENCENDER CÁMARA</button>

  <div id="result-panel" class="result-card">
    <div id="status-label" style="font-size:10px; color:#888;">ESTADO: ESPERANDO</div>
    <div id="display-name" style="font-size:20px; font-weight:bold; margin:10px 0;">---</div>
    <div id="display-type" style="color:var(--accent);">Enfoque el QR</div>
  </div>

  <script>
    const SUPABASE_URL = 'TU_URL_AQUÍ'; 
    const SUPABASE_KEY = 'TU_KEY_ANON_AQUÍ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let html5QrCode;

    async function prepararCamara() {
        const btn = document.getElementById('btn-iniciar');
        btn.innerText = "CARGANDO LENTES...";
        
        try {
            // 1. Pedir permisos y listar cámaras
            const devices = await Html5Qrcode.getCameras();
            
            if (devices && devices.length) {
                html5QrCode = new Html5Qrcode("reader");
                
                // Intentamos usar la cámara trasera directamente ("environment")
                const config = { fps: 15, qrbox: { width: 250, height: 250 } };
                
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                btn.style.display = "none";
            }
        } catch (err) {
            console.error(err);
            btn.innerText = "ERROR - REINTENTAR";
            alert("Safari bloqueó la cámara. Ve a Ajustes > Safari > Cámara > Permitir.");
        }
    }

    async function onScanSuccess(decodedText) {
        await html5QrCode.pause();
        const parts = decodedText.split('|');
        const nombre = parts[0] || "Desconocido";
        
        document.getElementById('status-label').innerText = "VERIFICANDO...";
        document.getElementById('display-name').innerText = nombre;

        const { data: ticket, error } = await _supabase.from('tickets').select('*').eq('codigo_qr', decodedText).single();

        if (error || !ticket) {
            updateUI(false, "ERROR", "TICKET INVÁLIDO");
        } else
