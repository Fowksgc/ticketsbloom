<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TicketsBloom - Scanner Pro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    :root { --bg: #050509; --card: #10101e; --accent: #00f2fe; --border: #1f1f33; --success: #00ff88; --error: #ff4d4d; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
    
    h2 { color: var(--accent); letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 5px; }
    .mode-tag { font-size: 10px; color: #666; margin-bottom: 20px; letter-spacing: 2px; }

    /* Cámara */
    #reader { width: 100%; max-width: 350px; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    
    /* Tarjeta de Resultado */
    .result-card { 
      margin-top: 25px; width: 100%; max-width: 350px; padding: 25px; border-radius: 20px; 
      background: var(--card); border: 1px solid var(--border); text-align: center; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    
    .status-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; color: #888; }
    .client-name { font-size: 22px; font-weight: 800; margin-bottom: 5px; display: block; }
    .ticket-type { font-size: 14px; color: var(--accent); opacity: 0.8; }

    /* Estados visuales */
    .access-granted { background: var(--success); color: #000; border: none; box-shadow: 0 0 40px rgba(0,255,136,0.3); transform: scale(1.05); }
    .access-denied { background: var(--error); color: white; border: none; box-shadow: 0 0 40px rgba(255,77,77,0.3); }
    
    .btn-reload { margin-top: 30px; background: none; border: 1px solid var(--border); color: #666; padding: 10px 20px; border-radius: 12px; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>TICKETSBLOOM</h2>
  <div class="mode-tag">CONTROL DE ACCESO • PUERTA</div>

  <div id="reader"></div>

  <div id="result-panel" class="result-card">
    <div id="status-label" class="status-title">Esperando Escaneo...</div>
    <span id="display-name" class="client-name">---</span>
    <span id="display-type" class="ticket-type">Enfoque un código QR</span>
  </div>

  <button class="btn-reload" onclick="location.reload()">Reiniciar Cámara
